<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Barons' War List Builder</title>
<meta http-equiv="refresh" content="0; url=./lite/">
<link rel="canonical" href="./lite/">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #1a1410; color: #e8dcc0; font-family: 'Crimson Pro', Georgia, serif; min-height: 100vh; }
  .wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; box-sizing: border-box; }
  .card { max-width: 520px; text-align: center; }
  h1 { font-family: 'Cinzel', serif; font-weight: 600; font-size: 1.6rem; letter-spacing: .04em; margin: 0 0 16px; color: #d4b87a; }
  p { font-size: 1.05rem; line-height: 1.5; margin: 0 0 20px; }
  a.btn { display: inline-block; padding: 10px 22px; border: 1px solid #d4b87a; color: #d4b87a; text-decoration: none; font-family: 'Cinzel', serif; letter-spacing: .06em; font-size: .95rem; }
  a.btn:hover { background: #d4b87a; color: #1a1410; }
  .small { font-size: .85rem; opacity: .7; margin-top: 24px; }
</style>
<script>window.location.replace('./lite/');</script>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Barons' War List Builder</h1>
    <p>Redirecting you to the Lite version&hellip;</p>
    <p><a class="btn" href="./lite/">Open Lite Builder</a></p>
  </div>
</div>
</body>
</html>
